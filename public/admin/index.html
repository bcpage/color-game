<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NULL — User Registry</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
    }
    #toolbar {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #toolbar-title { color: #fff; font-weight: bold; letter-spacing: 0.1em; }
    #toolbar-sub { color: #555; font-size: 11px; }
    #toolbar-count { color: #888; font-size: 11px; margin-left: auto; }
    .tb-btn {
      background: #222;
      border: 1px solid #444;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
    }
    .tb-btn:hover { border-color: #888; color: #ccc; }
    .tb-btn.danger:hover { border-color: #e94560; color: #e94560; }
    .del-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #333;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 1px 6px;
      cursor: pointer;
    }
    .del-btn:hover { border-color: #e94560; color: #e94560; }
    #table-wrap { overflow-x: auto; padding-bottom: 28px; }
    table { width: 100%; border-collapse: collapse; min-width: 1100px; }
    thead tr { background: #111; border-bottom: 2px solid #333; }
    th {
      text-align: left;
      padding: 6px 10px;
      color: #555;
      font-weight: normal;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      border-right: 1px solid #1a1a1a;
    }
    td {
      padding: 5px 10px;
      border-bottom: 1px solid #111;
      border-right: 1px solid #111;
      white-space: nowrap;
      color: #aaa;
      vertical-align: top;
    }
    tr:hover td { background: #0f0f0f; }
    .dim    { color: #444; }
    .dimmer { color: #333; }
    .bright { color: #ccc; }
    .right  { text-align: right; }
    .name-empty { color: #2a2a2a; font-style: italic; }
    .rooms-cell { color: #3a5a3a; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
    #empty-msg { padding: 40px; color: #333; text-align: center; }
    #status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #111;
      border-top: 1px solid #1a1a1a;
      padding: 3px 12px;
      font-size: 11px;
      color: #333;
      display: flex;
      gap: 24px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div>
      <div id="toolbar-title">NULL / USER REGISTRY</div>
      <div id="toolbar-sub">Transaction: /admin &nbsp;|&nbsp; ALV Grid Report &nbsp;|&nbsp; Auto-refresh: 30s</div>
    </div>
    <div id="toolbar-count"></div>
    <button class="tb-btn" onclick="load()">Refresh</button>
    <button class="tb-btn danger" onclick="clearAll()">Clear All</button>
  </div>

  <div id="table-wrap">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>#</th>
          <th>Cookie ID</th>
          <th>IP Address</th>
          <th>First Seen</th>
          <th>First Seen (Unix)</th>
          <th>Last Seen</th>
          <th>Visits</th>
          <th>Clicks</th>
          <th>Browser</th>
          <th>OS</th>
          <th>Device</th>
          <th>Language</th>
          <th>Name</th>
          <th>Rooms Visited</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty-msg" style="display:none">No subjects on record.</div>
  </div>

  <div id="status-bar">
    <span id="status-loaded"></span>
    <span id="status-time"></span>
  </div>

  <script>
    function fmt(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0') + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' +
        String(d.getMinutes()).padStart(2,'0') + ':' +
        String(d.getSeconds()).padStart(2,'0');
    }

    function reltime(ts) {
      if (!ts) return '—';
      const diff = Date.now() - ts;
      if (diff < 60000) return Math.floor(diff/1000) + 's ago';
      if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
      return Math.floor(diff/86400000) + 'd ago';
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function load() {
      fetch('/api/users')
        .then(r => r.json())
        .then(users => {
          users.sort((a, b) => (a.firstSeen || 0) - (b.firstSeen || 0));
          const tbody = document.getElementById('tbody');
          tbody.innerHTML = '';

          if (!users.length) {
            document.getElementById('empty-msg').style.display = '';
          } else {
            document.getElementById('empty-msg').style.display = 'none';
            users.forEach((u, i) => {
              const rooms = (u.rooms || []).join(' ');
              const tr = document.createElement('tr');
              tr.id = 'row-' + u.id;
              tr.innerHTML = `
                <td><button class="del-btn" onclick="delUser('${esc(u.id)}')">✕</button></td>
                <td class="dim">${String(i+1).padStart(5,'0')}</td>
                <td class="dimmer">${esc(u.id)}</td>
                <td>${esc(u.ip || '—')}</td>
                <td>${fmt(u.firstSeen)}</td>
                <td class="dimmer">${u.firstSeen ? Math.floor(u.firstSeen/1000) : '—'}</td>
                <td title="${fmt(u.lastSeen)}">${reltime(u.lastSeen)}</td>
                <td class="right">${u.visits || 0}</td>
                <td class="right">${u.cookieClicks || 0}</td>
                <td>${esc(u.browser || '—')}</td>
                <td>${esc(u.os || '—')}</td>
                <td class="dim">${esc(u.device || '—')}</td>
                <td class="dim">${esc(u.language || '—')}</td>
                <td class="${u.name ? 'bright' : 'name-empty'}">${esc(u.name || 'not set')}</td>
                <td class="rooms-cell" title="${esc(rooms)}">${esc(rooms) || '—'}</td>
              `;
              tbody.appendChild(tr);
            });
          }

          const count = users.length;
          document.getElementById('toolbar-count').textContent = `${count} subject${count !== 1 ? 's' : ''}`;
          document.getElementById('status-loaded').textContent = `${count} record${count !== 1 ? 's' : ''} loaded`;
          document.getElementById('status-time').textContent = `Last refresh: ${fmt(Date.now())}`;
        });
    }

    function delUser(id) {
      fetch('/api/users/' + id, { method: 'DELETE' })
        .then(() => {
          const row = document.getElementById('row-' + id);
          if (row) row.remove();
          load();
        });
    }

    function clearAll() {
      if (!confirm('Delete all user records?')) return;
      fetch('/api/users', { method: 'DELETE' }).then(() => load());
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
