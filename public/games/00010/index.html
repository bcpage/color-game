<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Goldfish</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: white;
      font-family: 'Fredoka One', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      gap: 28px;
      padding: 24px;
    }

    canvas {
      display: block;
    }

    #caption {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body data-game="00010">

<canvas id="bowl"></canvas>

<div id="caption">
  <span>The fish is fine.</span>
  <span>The fish has always been fine.</span>
  <span>The fish does not require anything from you.</span>
</div>

<script>
  // The fish's name is Constance.
  // She has been here since the beginning.
  // She does not know you are here.

  const canvas = document.getElementById('bowl');
  const ctx = canvas.getContext('2d');

  const SIZE = Math.min(window.innerWidth - 48, window.innerHeight - 160, 360);
  canvas.width  = SIZE;
  canvas.height = SIZE;

  const cx = SIZE / 2;
  const cy = SIZE / 2;
  const R  = SIZE / 2;

  // Swim ellipse — fish stays inside the bowl
  const EX = R * 0.48;
  const EY = R * 0.30;

  // Fish state
  let angle     = 0;
  let speed     = 0.008;
  let targetSpd = 0.008;
  let nextVary  = 0;
  let t         = 0;

  function varySpeed() {
    targetSpd = 0.006 + Math.random() * 0.005;
    nextVary  = t + 200 + Math.random() * 300;
  }

  function drawBowl() {
    // Water fill
    const grad = ctx.createRadialGradient(cx, cy - R * 0.1, R * 0.1, cx, cy, R * 0.95);
    grad.addColorStop(0, '#1a3a4a');
    grad.addColorStop(1, '#0d1e2a');
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.92, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Rim
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.92, 0, Math.PI * 2);
    ctx.strokeStyle = '#2a4a5a';
    ctx.lineWidth = SIZE * 0.025;
    ctx.stroke();

    // Surface shimmer
    ctx.beginPath();
    ctx.ellipse(cx, cy - R * 0.72, R * 0.38, R * 0.06, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fill();

    // Pebbles at the bottom
    const pebbles = [
      { x: cx - R*0.25, y: cy + R*0.65, rx: R*0.07, ry: R*0.04, c: '#2a3a30' },
      { x: cx + R*0.18, y: cy + R*0.70, rx: R*0.05, ry: R*0.03, c: '#1e2e28' },
      { x: cx - R*0.05, y: cy + R*0.72, rx: R*0.06, ry: R*0.035, c: '#243428' },
      { x: cx + R*0.38, y: cy + R*0.62, rx: R*0.04, ry: R*0.03, c: '#2a3a30' },
    ];
    pebbles.forEach(p => {
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.rx, p.ry, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.c;
      ctx.fill();
    });
  }

  function drawFish(fx, fy, facing, waggle) {
    ctx.save();
    ctx.translate(fx, fy);
    ctx.rotate(facing);

    const bl = SIZE * 0.11; // body length
    const bh = SIZE * 0.055; // body height

    // Tail
    const tailWag = Math.sin(waggle) * 0.4;
    ctx.save();
    ctx.rotate(tailWag);
    ctx.beginPath();
    ctx.moveTo(-bl * 0.6, 0);
    ctx.lineTo(-bl * 1.1,  bh * 0.9);
    ctx.lineTo(-bl * 1.1, -bh * 0.9);
    ctx.closePath();
    ctx.fillStyle = '#e06820';
    ctx.fill();
    ctx.restore();

    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, bl, bh, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#ff8c42';
    ctx.fill();

    // Belly highlight
    ctx.beginPath();
    ctx.ellipse(bl * 0.1, bh * 0.2, bl * 0.55, bh * 0.45, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,180,100,0.35)';
    ctx.fill();

    // Eye
    ctx.beginPath();
    ctx.arc(bl * 0.55, -bh * 0.2, bh * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bl * 0.57, -bh * 0.24, bh * 0.07, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();

    ctx.restore();
  }

  function frame() {
    t++;
    if (t >= nextVary) varySpeed();
    speed += (targetSpd - speed) * 0.02;
    angle += speed;

    const fx = cx + Math.cos(angle) * EX;
    const fy = cy + Math.sin(angle) * EY;

    // Facing direction — tangent to the ellipse
    const tx = -Math.sin(angle) * EX;
    const ty =  Math.cos(angle) * EY;
    const facing = Math.atan2(ty, tx);

    ctx.clearRect(0, 0, SIZE, SIZE);
    drawBowl();
    drawFish(fx, fy, facing, t * 0.18);

    requestAnimationFrame(frame);
  }

  varySpeed();
  requestAnimationFrame(frame);
</script>

<script src="/shared/nav.js"></script>
</body>
</html>
