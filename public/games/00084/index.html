<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Intercom — NULL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050508;
  color: #ccc;
  font-family: monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 2.5rem;
}
.panel {
  width: 100%;
  max-width: 400px;
  border: 1px solid rgba(200,180,140,0.15);
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  position: relative;
}
.panel-label {
  position: absolute;
  top: -0.55rem;
  left: 1rem;
  background: #050508;
  padding: 0 0.4rem;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: rgba(200,180,140,0.3);
  text-transform: uppercase;
}
/* Grille */
.grille {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 3px;
  padding: 0.5rem;
  background: rgba(200,180,140,0.03);
  border: 1px solid rgba(200,180,140,0.08);
}
.grille-dot {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 50%;
  background: rgba(200,180,140,0.12);
  transition: background 0.05s;
}
.grille-dot.active { background: rgba(233,69,96,0.6); }

.indicator {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: rgba(200,180,140,0.3);
}
.led {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(200,180,140,0.2);
  flex-shrink: 0;
}
.led.on { background: #e94560; box-shadow: 0 0 6px #e94560; }
.led.live { background: #8fa878; box-shadow: 0 0 6px #8fa878; animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

textarea {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(200,180,140,0.2);
  color: rgba(200,180,140,0.8);
  font-family: monospace;
  font-size: 0.8rem;
  padding: 0.6rem;
  resize: none;
  height: 70px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
textarea:focus { border-color: rgba(200,180,140,0.5); }

.btn {
  width: 100%;
  padding: 0.7rem;
  background: transparent;
  border: 1px solid rgba(200,180,140,0.25);
  color: rgba(200,180,140,0.5);
  font-family: monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover:not(:disabled) {
  border-color: rgba(200,180,140,0.6);
  color: rgba(200,180,140,0.9);
  background: rgba(200,180,140,0.04);
}
.btn:disabled { opacity: 0.3; cursor: default; }

.note {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: rgba(200,180,140,0.2);
  text-align: center;
  line-height: 1.8;
}

/* Incoming broadcast display */
.broadcast {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: rgba(5,5,8,0.97);
  border-bottom: 1px solid rgba(233,69,96,0.4);
  padding: 1.2rem 2rem;
  display: none;
  flex-direction: column;
  gap: 0.4rem;
  z-index: 100;
}
.broadcast.visible { display: flex; }
.bc-label {
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: rgba(233,69,96,0.6);
  text-transform: uppercase;
}
.bc-text {
  font-size: 1rem;
  letter-spacing: 0.05em;
  color: rgba(220,200,170,0.9);
  line-height: 1.5;
}
</style>
</head>
<body data-game="00084" data-nav="matrix">

<div class="broadcast" id="broadcast">
  <div class="bc-label">⬛ PA BROADCAST — NULL FACILITY</div>
  <div class="bc-text" id="bc-text"></div>
</div>

<div class="panel">
  <div class="panel-label">INTERCOM UNIT 84</div>

  <div class="grille" id="grille"></div>

  <div class="indicator">
    <div class="led" id="connLed"></div>
    <span id="connStatus">connecting...</span>
  </div>

  <textarea id="msg" maxlength="200" placeholder="Speak into the intercom..."></textarea>

  <button class="btn" id="sendBtn" onclick="send()" disabled>Broadcast</button>

  <div class="note">
    Your message will be transmitted to all currently connected units.<br>
    You will not know if anyone received it.
  </div>
</div>

<script src="/shared/matrix-nav.js"></script>
<script>
// Build grille
const grille = document.getElementById('grille');
const dots = [];
for (let i = 0; i < 60; i++) {
  const d = document.createElement('div');
  d.className = 'grille-dot';
  grille.appendChild(d);
  dots.push(d);
}

function animateGrille(intensity) {
  dots.forEach(d => {
    d.classList.toggle('active', Math.random() < intensity);
  });
}

let grilleInterval = null;
function startGrille() {
  let t = 0;
  grilleInterval = setInterval(() => {
    t++;
    const intensity = t < 10 ? (t / 10) * 0.6 : Math.max(0, 0.6 - (t - 10) * 0.08);
    animateGrille(intensity);
    if (t > 20) { clearInterval(grilleInterval); grilleInterval = null; animateGrille(0); }
  }, 60);
}

const broadcastEl = document.getElementById('broadcast');
const bcTextEl    = document.getElementById('bc-text');
const connLed     = document.getElementById('connLed');
const connStatus  = document.getElementById('connStatus');
const sendBtn     = document.getElementById('sendBtn');

let ws, broadcastTimer;

function showBroadcast(text) {
  bcTextEl.textContent = text;
  broadcastEl.classList.add('visible');
  startGrille();
  clearTimeout(broadcastTimer);
  broadcastTimer = setTimeout(() => broadcastEl.classList.remove('visible'), 6000);
}

function connect() {
  ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    connLed.className = 'led live';
    connStatus.textContent = 'connected';
    sendBtn.disabled = false;
  };

  ws.onmessage = e => {
    try {
      const data = JSON.parse(e.data);
      if (data.game === 'intercom' && data.type === 'broadcast') {
        showBroadcast(data.text);
      }
    } catch (_) {}
  };

  ws.onclose = () => {
    connLed.className = 'led';
    connStatus.textContent = 'disconnected';
    sendBtn.disabled = true;
    setTimeout(connect, 3000);
  };
}

function send() {
  const text = document.getElementById('msg').value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ game: 'intercom', type: 'send', text }));
  document.getElementById('msg').value = '';

  // No confirmation — sender doesn't know if received
  const led = document.getElementById('connLed');
  led.className = 'led on';
  setTimeout(() => { led.className = 'led live'; }, 500);
}

// Send on Enter (not Shift+Enter)
document.getElementById('msg').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

connect();
</script>
</body>
</html>
