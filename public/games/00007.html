<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: white;
      font-family: 'Fredoka One', cursive;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 8px;
      gap: 8px;
    }

    /* ── Name bar ── */
    #name-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #name-bar label {
      font-size: 1rem;
      color: #aaa;
      white-space: nowrap;
    }

    #name-input {
      flex: 1;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid #555;
      background: #252545;
      color: white;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    #name-input:focus { border-color: #4488ff; }

    #online-count {
      font-size: 0.85rem;
      color: #555;
      white-space: nowrap;
    }

    /* ── Message list ── */
    #messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px 2px;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: slide-in 0.15s ease-out;
    }
    .msg.mine { align-self: flex-end; align-items: flex-end; }
    .msg.theirs { align-self: flex-start; align-items: flex-start; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-name {
      font-size: 0.72rem;
      color: #666;
      margin-bottom: 2px;
      padding: 0 6px;
    }

    .msg-bubble {
      padding: 8px 14px;
      border-radius: 18px;
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      line-height: 1.3;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .mine .msg-bubble {
      background: #4488ff;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .theirs .msg-bubble {
      background: #252545;
      color: white;
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 0.65rem;
      color: #444;
      margin-top: 2px;
      padding: 0 6px;
    }

    /* System messages */
    .sys-msg {
      align-self: center;
      font-size: 0.78rem;
      color: #555;
      padding: 2px 10px;
      font-style: italic;
    }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      padding: 10px 16px;
      border-radius: 24px;
      border: 2px solid #555;
      background: #252545;
      color: white;
      outline: none;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: #4488ff; }
    #msg-input::placeholder { color: #555; }

    #send-btn {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #4488ff;
      color: white;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover { background: #2266dd; }
    #send-btn:active { transform: scale(0.9); }
    #send-btn:disabled { background: #333; cursor: default; }

    #status-bar {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
      flex-shrink: 0;
      min-height: 1em;
    }
    #status-bar.err { color: #e94560; }
  </style>
</head>
<body data-game="00007">

  <div id="name-bar">
    <label for="name-input">Name:</label>
    <input id="name-input" type="text" maxlength="24" placeholder="Enter your name…" autocomplete="off" spellcheck="false">
    <span id="online-count"></span>
  </div>

  <div id="messages"></div>

  <div id="status-bar"></div>

  <div id="input-bar">
    <textarea id="msg-input" rows="1" maxlength="500" placeholder="Type a message…"></textarea>
    <button id="send-btn" disabled>➤</button>
  </div>

  <script src="/shared/nav.js"></script>
  <script>
    const messagesEl  = document.getElementById('messages');
    const nameInput   = document.getElementById('name-input');
    const msgInput    = document.getElementById('msg-input');
    const sendBtn     = document.getElementById('send-btn');
    const statusBar   = document.getElementById('status-bar');
    const onlineCount = document.getElementById('online-count');

    // ── Name persistence
    nameInput.value = localStorage.getItem('chat-name') || '';
    nameInput.addEventListener('input', () => {
      localStorage.setItem('chat-name', nameInput.value.trim());
    });

    // ── Auto-grow textarea
    msgInput.addEventListener('input', () => {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
      sendBtn.disabled = !msgInput.value.trim();
    });

    // ── Time formatting
    function fmtTime(ts) {
      const d = new Date(ts);
      const h = d.getHours(), m = String(d.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    // ── Render one message bubble
    function addMessage(msg, prepend = false) {
      const myName = nameInput.value.trim();
      const mine = myName && msg.name === myName;

      const wrap = document.createElement('div');
      wrap.className = 'msg ' + (mine ? 'mine' : 'theirs');

      const nameEl = document.createElement('div');
      nameEl.className = 'msg-name';
      nameEl.textContent = msg.name;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = msg.text;

      const timeEl = document.createElement('div');
      timeEl.className = 'msg-time';
      timeEl.textContent = fmtTime(msg.time);

      wrap.appendChild(nameEl);
      wrap.appendChild(bubble);
      wrap.appendChild(timeEl);

      if (prepend) {
        messagesEl.prepend(wrap);
      } else {
        messagesEl.appendChild(wrap);
        scrollToBottom();
      }
    }

    function addSys(text) {
      const el = document.createElement('div');
      el.className = 'sys-msg';
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Send
    function sendMessage() {
      const name = nameInput.value.trim() || 'Anonymous';
      const text = msgInput.value.trim();
      if (!text) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ game:'chat', type:'msg', name, text }));
      msgInput.value = '';
      msgInput.style.height = 'auto';
      sendBtn.disabled = true;
      msgInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', e => {
      // Enter sends; Shift+Enter = new line
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── WebSocket
    let ws;
    function connect() {
      statusBar.className = '';
      statusBar.textContent = 'Connecting…';
      ws = new WebSocket(`ws://${window.location.host}`);

      ws.onopen = () => {
        statusBar.textContent = '';
        sendBtn.disabled = !msgInput.value.trim();
      };

      ws.onclose = () => {
        statusBar.className = 'err';
        statusBar.textContent = 'Disconnected — retrying…';
        sendBtn.disabled = true;
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.game !== 'chat') return;

        if (data.type === 'history') {
          messagesEl.innerHTML = '';
          if (data.messages.length === 0) {
            addSys('No messages yet. Say hello!');
          } else {
            data.messages.forEach(m => addMessage(m));
          }
        }

        if (data.type === 'msg') {
          // Remove the "no messages yet" hint if present
          const sys = messagesEl.querySelector('.sys-msg');
          if (sys) sys.remove();
          addMessage(data);
        }
      };
    }
    connect();
  </script>
</body>
</html>
