<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>00135 — Vector Race</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050508;
    color: #8a9aaa;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px 20px;
    user-select: none;
  }
  .room-id { font-size: 10px; letter-spacing: 5px; color: #223; }
  .title { font-size: 11px; letter-spacing: 5px; color: #445; text-transform: uppercase; }
  .hud {
    display: flex; gap: 28px; font-size: 10px; letter-spacing: 3px; color: #334;
  }
  .hud .val { color: #7a9aaa; }
  .hud .p1 { color: #5a9acc; }
  .hud .p2 { color: #cc7a3a; }

  #canvas-wrap {
    border: 1px solid #1a1a2a;
    background: #060609;
    position: relative;
  }
  canvas { display: block; }

  #overlay {
    position: absolute; inset: 0;
    background: rgba(5,5,8,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  #overlay.hidden { display: none; }
  #overlay .big { font-size: 13px; letter-spacing: 6px; color: #9ab4c4; }
  #overlay .sub { font-size: 10px; letter-spacing: 3px; color: #445; line-height: 2; text-align: center; }
  #overlay button {
    background: #0c0c18; border: 1px solid #2a3a4a; color: #8a9aaa;
    font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
    padding: 10px 28px; cursor: pointer; margin-top: 8px;
  }
  #overlay button:hover { background: #10101e; }

  #velocity-pad {
    display: grid; grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(3, 48px);
    gap: 4px;
  }
  .vbtn {
    background: #0c0c18; border: 1px solid #1a1a2a; color: #556;
    font-family: 'Courier New', monospace; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .vbtn:hover:not(:disabled) { background: #141428; color: #7a9aaa; }
  .vbtn:disabled { opacity: 0.3; cursor: default; }
  .vbtn.center { background: #0a0a16; color: #334; font-size: 11px; letter-spacing: 1px; }
  .controls { font-size: 10px; letter-spacing: 2px; color: #223; text-align: center; }
  .controls span { color: #334; }
  #status-msg { font-size: 11px; letter-spacing: 3px; color: #445; min-height: 18px; text-align: center; }
</style>
</head>
<body data-game="00135" data-nav="matrix">
<div class="room-id">ROOM 00135</div>
<div class="title">Vector Race</div>

<div class="hud">
  <span>PLAYER 1 <span class="val p1" id="p1-vel">(0,0)</span></span>
  <span>TURN <span class="val" id="hud-turn">—</span></span>
  <span>PLAYER 2 <span class="val p2" id="p2-vel">(0,0)</span></span>
</div>

<div id="canvas-wrap">
  <canvas id="c" width="480" height="320"></canvas>
  <div id="overlay">
    <div class="big">VECTOR RACE</div>
    <div class="sub" id="overlay-sub">Two players take seats.<br>Adjust velocity each turn.<br>First to the finish line wins.</div>
    <button id="overlay-btn">TAKE SEAT</button>
  </div>
</div>

<div id="velocity-pad">
  <button class="vbtn" data-dvy="-1" data-dvx="-1">↖</button>
  <button class="vbtn" data-dvy="-1" data-dvx="0">↑</button>
  <button class="vbtn" data-dvy="-1" data-dvx="1">↗</button>
  <button class="vbtn" data-dvy="0"  data-dvx="-1">←</button>
  <button class="vbtn center" data-dvy="0" data-dvx="0">●</button>
  <button class="vbtn" data-dvy="0"  data-dvx="1">→</button>
  <button class="vbtn" data-dvy="1"  data-dvx="-1">↙</button>
  <button class="vbtn" data-dvy="1"  data-dvx="0">↓</button>
  <button class="vbtn" data-dvy="1"  data-dvx="1">↘</button>
</div>

<div id="status-msg"></div>

<div class="controls"><span>Click arrows</span> to adjust velocity &nbsp;|&nbsp; <span>●</span> maintain current vector</div>

<script src="/shared/matrix-nav.js"></script>
<script>
const CELL = 20;
const GW = 24, GH = 16;
const FINISH_X = 22;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const P_COLORS = ['#5a9acc', '#cc7a3a'];
const P_TRAIL  = ['rgba(90,154,204,0.3)', 'rgba(204,122,58,0.3)'];

let ws = null;
let state = null;
let mySeat = -1;
let joined = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.game === 'race' && msg.type === 'seat') { mySeat = msg.seat; }
    if (msg.game === 'race' && msg.type === 'state') { state = msg; render(); updateUI(); }
  };
  ws.onopen = () => { /* auto-request state */ };
  ws.onclose = () => setTimeout(connect, 2000);
}

function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

function render() {
  if (!state) return;
  ctx.fillStyle = '#060609';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#0d0d1a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= GW; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,GH*CELL); ctx.stroke();
  }
  for (let y = 0; y <= GH; y++) {
    ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(GW*CELL,y*CELL); ctx.stroke();
  }

  // Finish line
  ctx.strokeStyle = '#2a5a2a';
  ctx.lineWidth = 2;
  ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(FINISH_X*CELL,0); ctx.lineTo(FINISH_X*CELL,GH*CELL); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#1a4a1a';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('FINISH', FINISH_X*CELL, 10);

  // Trails
  state.trails.forEach((trail, pi) => {
    if (trail.length < 2) return;
    ctx.strokeStyle = P_TRAIL[pi];
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(trail[0][0]*CELL + CELL/2, trail[0][1]*CELL + CELL/2);
    for (let i = 1; i < trail.length; i++) {
      ctx.lineTo(trail[i][0]*CELL + CELL/2, trail[i][1]*CELL + CELL/2);
    }
    ctx.stroke();
    // Trail dots
    trail.forEach(([tx,ty]) => {
      ctx.beginPath();
      ctx.arc(tx*CELL+CELL/2, ty*CELL+CELL/2, 2, 0, Math.PI*2);
      ctx.fillStyle = P_TRAIL[pi];
      ctx.fill();
    });
  });

  // Velocity vector preview
  if (state.status === 'playing' && mySeat >= 0) {
    const p = state.players[mySeat];
    ctx.strokeStyle = `${P_COLORS[mySeat]}55`;
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(p.x*CELL+CELL/2, p.y*CELL+CELL/2);
    ctx.lineTo((p.x+p.vx)*CELL+CELL/2, (p.y+p.vy)*CELL+CELL/2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Players
  state.players.forEach((p, pi) => {
    ctx.fillStyle = P_COLORS[pi];
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    const px = p.x*CELL + CELL/2, py = p.y*CELL + CELL/2;

    if (p.crashed) {
      ctx.fillStyle = '#cc3333';
      ctx.font = 'bold 14px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✕', px, py);
    } else {
      ctx.beginPath();
      ctx.arc(px, py, 7, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#000';
      ctx.font = 'bold 8px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pi+1, px, py);
    }
  });
}

function updateUI() {
  if (!state) return;
  const overlay = document.getElementById('overlay');
  const sub = document.getElementById('overlay-sub');
  const btn = document.getElementById('overlay-btn');
  const turnEl = document.getElementById('hud-turn');
  const statusEl = document.getElementById('status-msg');

  // HUD
  const p1v = state.players[0];
  const p2v = state.players[1];
  document.getElementById('p1-vel').textContent = `(${p1v.vx},${p1v.vy})`;
  document.getElementById('p2-vel').textContent = `(${p2v.vx},${p2v.vy})`;

  if (state.status === 'won') {
    turnEl.textContent = '—';
    statusEl.textContent = `PLAYER ${state.winner + 1} WINS`;
    statusEl.style.color = P_COLORS[state.winner];
    overlay.classList.remove('hidden');
    overlay.querySelector('.big').textContent = `PLAYER ${state.winner + 1} WINS`;
    sub.textContent = 'New race begins shortly.';
    btn.style.display = 'none';
    return;
  }

  if (state.status === 'waiting') {
    overlay.classList.remove('hidden');
    const takenCount = (state.seats[0] ? 1 : 0) + (state.seats[1] ? 1 : 0);
    if (joined && mySeat >= 0) {
      overlay.querySelector('.big').textContent = 'WAITING';
      sub.textContent = `Seat ${mySeat+1} taken.\nWaiting for second player.`;
      btn.style.display = 'none';
    } else if (!joined) {
      overlay.querySelector('.big').textContent = 'VECTOR RACE';
      sub.textContent = 'Two players. Adjust velocity each turn.\nFirst past the finish line wins.\n\nSeats available: ' + (2 - takenCount);
      btn.style.display = takenCount < 2 ? '' : 'none';
      btn.textContent = 'TAKE SEAT';
    }
    setButtonsEnabled(false);
    return;
  }

  // Playing
  overlay.classList.add('hidden');
  const isMyTurn = state.status === 'playing' && state.turn === mySeat;
  turnEl.textContent = `PLAYER ${state.turn + 1}`;
  turnEl.style.color = P_COLORS[state.turn];
  statusEl.textContent = isMyTurn ? 'YOUR TURN — choose velocity adjustment' : 'WAITING FOR OTHER PLAYER';
  statusEl.style.color = isMyTurn ? P_COLORS[mySeat] : '#334';
  setButtonsEnabled(isMyTurn);
}

function setButtonsEnabled(on) {
  document.querySelectorAll('.vbtn').forEach(b => b.disabled = !on);
}

document.getElementById('overlay-btn').addEventListener('click', () => {
  joined = true;
  send({ game:'race', type:'join' });
});

document.querySelectorAll('.vbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!state || state.turn !== mySeat || state.status !== 'playing') return;
    const dvx = parseInt(btn.dataset.dvx);
    const dvy = parseInt(btn.dataset.dvy);
    send({ game:'race', type:'move', dvx, dvy });
  });
});

// Keyboard support
document.addEventListener('keydown', e => {
  if (!state || state.turn !== mySeat || state.status !== 'playing') return;
  const map = {
    '7':[-1,-1],'8':[0,-1],'9':[1,-1],
    '4':[-1,0], '5':[0,0],  '6':[1,0],
    '1':[-1,1], '2':[0,1],  '3':[1,1],
    'ArrowUp':[0,-1],'ArrowDown':[0,1],
    'ArrowLeft':[-1,0],'ArrowRight':[1,0],
    ' ':[0,0]
  };
  if (map[e.key]) {
    e.preventDefault();
    const [dvx,dvy] = map[e.key];
    send({ game:'race', type:'move', dvx, dvy });
  }
});

// Auto-assign seat index from server state (first who joined)
function detectSeat() {
  if (!state || mySeat >= 0) return;
  // The server doesn't directly tell us our seat — infer from join order.
  // We track via the overlay-btn click. mySeat is set when server confirms by
  // toggling a seat from false→true.
}

connect();
setButtonsEnabled(false);
</script>
</body>
</html>
